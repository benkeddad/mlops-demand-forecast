version: '3.8'

services:
  mlflow_server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/code/mlruns
    # Runs instantly using the pre-installed mlflow package from your requirements
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /code/mlruns --default-artifact-root /code/mlruns

  fastapi_app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      MODEL_URI: ${MODEL_URI}
      MLFLOW_TRACKING_URI: http://mlflow_server:5000
    env_file:
      - .env
    volumes:
      - ./mlruns:/code/mlruns
    restart: on-failure