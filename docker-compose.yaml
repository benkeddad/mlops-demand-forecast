services:
  # Your FastAPI Application
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PREFECT_API_URL=http://prefect:4200/api
    depends_on:
      - mlflow
      - prefect

  # MLflow Tracking Server (Fixed Allowed Hosts for internal Docker Network)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts "*"

  # Prefect Server (Pinned to 2.14)
  prefect:
    image: prefecthq/prefect:2.14-python3.10
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0